name: MainTesting

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: UbuntuMainTesting
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dotnetVersion:
          #- 6.0.x
          - 9.0.x
    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ matrix.dotnetVersion }}
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build ${{ github.workspace }} --no-restore --configuration Release
    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal