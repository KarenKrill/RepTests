name: Publishing

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

env:
  ARTIFACTS_DIR: ${{ github.workspace }}/bin/Release
  NUPKG_SOURCE: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
  BUILD_CONFIG: Release
  CI_BUILD: true
  IS_MS_BUILD: false

jobs:
  build-and-publish:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        dotnetVersion: [ 6.x, 10.x ]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Check if tag is on default branch
      shell: bash
      run: |
        DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
        git fetch origin $DEFAULT_BRANCH
        if git merge-base --is-ancestor $GITHUB_SHA origin/$DEFAULT_BRANCH; then
          echo "IS_DEFAULT_BRANCH=true" >> $GITHUB_ENV
        else
          echo "IS_DEFAULT_BRANCH=false" >> $GITHUB_ENV
        fi
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ matrix.dotnetVersion }}
        cache: true
        cache-dependency-path: '**/packages.lock.json'
    - name: Add GitOwner NuGet Source
      run: |
        dotnet nuget add source \
        --username ${{ github.actor }} \
        --password ${{ secrets.NUGET_PUBLISH_TOKEN }} \
        --store-password-in-clear-text \
        --name GitOwnerSource \
        ${{ env.NUPKG_SOURCE }}
    - name: Restore dependencies
      run: dotnet restore --locked-mode
    - name: Cleanup GitOwner NuGet Source
      if: always()
      run: dotnet nuget remove source "GitOwnerSource" || true
    - name: MSBuild
      if: env.IS_MS_BUILD == 'true'
      shell: bash
      run: |
        VERSION=${{ github.ref_name }}
        NO_V_VERSION=${VERSION#v}
        CLEAN_VERSION=${NO_V_VERSION%%-*}
        dotnet msbuild /t:Build \
          /p:RestorePackages=false \
          /p:Configuration=${{ env.BUILD_CONFIG }} \
          /p:Version=$CLEAN_VERSION \
          /p:InformationalVersion=$VERSION \
          /p:Platform="Any CPU" \
    - name: Build
      if: env.IS_MS_BUILD != 'true'
      run: |
        dotnet build ${{ github.workspace }} \
        --no-restore \
        --configuration ${{ env.BUILD_CONFIG }} \
        /p:Version=${{ github.ref_name }} \
        /p:Platform="Any CPU"

    - name: Pack and publish
      shell: bash
      run: |
        shopt -s globstar nullglob dotglob
        for proj in **/*.csproj; do
            echo "Checking $proj"
            IS_SHIPPING_TARGET=$(dotnet msbuild "$proj" -nologo -getProperty:IsShippingTarget)
            IS_SHIPPING_TARGET=$(echo "$IS_SHIPPING_TARGET" | tr '[:upper:]' '[:lower:]')
            if [[ "$IS_SHIPPING_TARGET" == "true" ]]; then
              SHIPPING_TYPE=$(dotnet msbuild "$proj" -nologo -getProperty:ShippingType)
              IS_PACKABLE=$(dotnet msbuild "$proj" -nologo -getProperty:IsPackable)
              IS_PACKABLE=$(echo "$IS_PACKABLE" | tr '[:upper:]' '[:lower:]')
              NAME=$(basename "$proj" .csproj)
              DIR=$(dirname "$proj")
              PKG_OUT_DIR=$(dotnet msbuild "$proj" -nologo -property:Configuration=${{ env.BUILD_CONFIG }} -getProperty:PackageOutputPath)
              FULL_PKG_OUT_DIR="$DIR/$PKG_OUT_DIR"
              echo "Output: $FULL_PKG_OUT_DIR"
              echo "-> Shipping project $NAME (Packable - $IS_PACKABLE, OutputType - $SHIPPING_TYPE)"
              if [[ "$SHIPPING_TYPE" == "Archive" ]]; then
                echo "Publishing app..."
                APP_ARTIFACTS_DIR=${{ env.ARTIFACTS_DIR }}/$NAME-${{ github.ref_name }}.${{ matrix.os }}
                dotnet publish "$proj" --no-build -c ${{ env.BUILD_CONFIG }} --no-self-contained -o $APP_ARTIFACTS_DIR
                (cd "$APP_ARTIFACTS_DIR" && tar -czf "$APP_ARTIFACTS_DIR.tar.gz" *)
              elif [[ "$SHIPPING_TYPE" == "NuGet" && "$IS_PACKABLE" == "true" && ${{ matrix.os }} == "ubuntu-latest" ]]; then
                echo "Packing NuGet..."
                IS_ALREADY_PACKED=$(dotnet msbuild "$proj" -nologo -getProperty:GeneratePackageOnBuild)
                IS_ALREADY_PACKED=$(echo "$IS_ALREADY_PACKED" | tr '[:upper:]' '[:lower:]')
                if [[ "$IS_ALREADY_PACKED" != "true" ]]; then
                  dotnet pack "$proj" --no-build -c ${{ env.BUILD_CONFIG }} -o ${{ env.ARTIFACTS_DIR }} /p:Version=${{ github.ref_name }}
                else
                  mkdir -p ${{ env.ARTIFACTS_DIR }}
                  cp -r -f $FULL_PKG_OUT_DIR/*.* ${{ env.ARTIFACTS_DIR }}/
                fi
              else
                echo "Skipping (non-packable library)"
              fi
            fi
          done
    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2.6.1
      with:
        files: ${{ env.ARTIFACTS_DIR }}/*.*
        generate_release_notes: true
        prerelease: ${{ env.IS_DEFAULT_BRANCH != 'true' || contains(github.ref, '-') }}
        
    - name: Package push
      id: PackagePush
      run: dotnet nuget push ${{ env.ARTIFACTS_DIR }}/*.nupkg --api-key ${{ secrets.NUGET_PUBLISH_TOKEN }} --source ${{ env.NUPKG_SOURCE }} --skip-duplicate
