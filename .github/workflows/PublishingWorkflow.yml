name: Publishing

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

env:
  NUPKG_PROJ_PATH: ${{ github.workspace }}/SomeClassLibrary/SomeClassLibrary.csproj
  NUPKG_DIR: ./nupackages
  BUILD_CONFIG: Release

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build ${{ github.workspace }} --no-restore --configuration ${{ env.BUILD_CONFIG }}
    - name: Package build
      run: dotnet pack ${{ env.NUPKG_PROJ_PATH }} --no-build --no-restore --configuration ${{ env.BUILD_CONFIG }} --output ${{ env.NUPKG_DIR }}
      
    - name: Create archives
      run: |
        tar -czf release-linux.tar.gz **/bin/Release/**
    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release-linux.tar.gz
          ${{ env.NUPKG_DIR }}/*.nupkg
        generate_release_notes: true

    - name: Add nuget source
      run: dotnet nuget add source --username ${{ github.actor }} --password ${{ secrets.NUGET_PUBLISH_TOKEN }} --store-password-in-clear-text --name GitOwnerSource https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
    - name: Package push
      id: PackagePush
      run: dotnet nuget push ${{ env.NUPKG_DIR }}/*.nupkg --source GitOwnerSource --skip-duplicate
      continue-on-error: true
    - name: Remove nuget source
      run: dotnet nuget remove source GitOwnerSource
    - name: On package push failed
      if: steps.PackagePush.outcome != 'success'
      run: exit 1
