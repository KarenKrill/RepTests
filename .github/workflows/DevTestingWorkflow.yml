# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: DevTesting

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]
  workflow_dispatch: # to run manually

jobs:
  build-and-test:
    name: UbuntuDevTesting
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dotnetVersion:
          #- 6.x
          - 9.x
        buildConfig:
          - Debug
          #- Release
    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ matrix.dotnetVersion }}
        cache: true
        cache-dependency-path: '**/packages.lock.json'
    - name: Add GitOwner NuGet Source
      run: |
        dotnet nuget add source \
        --username ${{ github.actor }} \
        --password ${{ secrets.NUGET_PUBLISH_TOKEN }} \
        --store-password-in-clear-text \
        --name GitOwnerSource \
        https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
    - name: Restore dependencies
      run: dotnet restore --locked-mode
    - name: Build
      run: dotnet build ${{ github.workspace }} --no-restore --configuration ${{ matrix.buildConfig }}
    - name: Cleanup GitOwner NuGet Source
      if: always()
      run: dotnet nuget remove source "GitOwnerSource" || true
    - name: Test
      run: dotnet test --no-build --configuration ${{ matrix.buildConfig }} --verbosity normal